<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchHub — Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css?v=4">
<style>
.profile-header{background:linear-gradient(135deg,var(--blue),#7c3aed);border-radius:var(--radius);padding:32px;color:#fff;display:flex;align-items:center;gap:24px;margin-bottom:22px}
.profile-big-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;flex-shrink:0}
.profile-header h2{font-size:22px;font-weight:700}
.profile-header p{opacity:.85;font-size:13px;margin-top:4px}
.profile-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:500;display:inline-block;margin-top:8px}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand"><div class="brand-logo"><div class="brand-icon"><svg width="18" height="18" viewBox="0 0 32 32" fill="none"><path d="M16 6L4 13l12 7 12-7-12-7z" fill="white"/><path d="M4 19l12 7 12-7" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".75"/></svg></div><div><div class="brand-name">ResearchHub</div><div class="brand-role">Scholar Portal</div></div></div></div>
  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>Dashboard</a>
    <a class="nav-item" href="my-professor.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M1 13c0-3 2.2-5 5-5s5 2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M12 7v4M14 9h-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>My Professor</a>
    <a class="nav-item" href="directory.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><circle cx="3" cy="12" r="2" stroke="currentColor" stroke-width="1.3" opacity=".5"/><circle cx="13" cy="12" r="2" stroke="currentColor" stroke-width="1.3" opacity=".5"/></svg>Faculty Directory</a>
    <a class="nav-item" href="milestones.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3.5l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Milestones</a>
    <a class="nav-item" href="publications.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 7h6M5 10h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Publications</a>
    <a class="nav-item" href="leave.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M2 11V5l5-3 5 3v6l-5 3-5-3z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>Leave Request</a>
    <a class="nav-item" href="attendance.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Attendance</a>
    <a class="nav-item" href="documents.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><path d="M3 2h10v12H3z" stroke="currentColor" stroke-width="1.3"/><path d="M5 6h6M5 9h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Documents</a>
    <a class="nav-item" href="stipend.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v6M5.5 7.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Stipend</a>
    <a class="nav-item" href="messages.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M4 7h8M4 10h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Messages</a>
    <a class="nav-item active" href="profile.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 13c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Profile</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-chip"><div class="avatar" id="sb-avatar">S</div><div><div class="user-name" id="sb-name">Scholar</div><div class="user-dept" id="sb-dept">Loading...</div></div></div>
    <div class="logout-btn" onclick="doLogout()"><svg width="14" height="14" fill="none" viewBox="0 0 16 16"><path d="M6 3H3v10h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>Sign out</div>
  </div>
</aside>

<main class="main">
  <div class="topbar"><div><div class="page-title">My Profile</div><div class="page-sub">View and update your personal information</div></div></div>

  <div class="profile-header" id="profile-header">
    <div class="profile-big-avatar" id="p-avatar">S</div>
    <div>
      <h2 id="p-name">Loading...</h2>
      <p id="p-uni">—</p>
      <span class="profile-badge" id="p-dept">—</span>
    </div>
  </div>

  <div class="two-col">
    <div class="card">
      <div class="card-title">Personal Details</div>
      <div class="field"><label>First Name</label><input type="text" id="f-first"></div>
      <div class="field"><label>Last Name</label><input type="text" id="f-last"></div>
      <div class="field"><label>Phone</label><input type="text" id="f-phone" placeholder="+91 XXXXX XXXXX"></div>
      <div class="field"><label>Gender</label>
        <select id="f-gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
    </div>
    <div class="card">
      <div class="card-title">Academic Details</div>
      <div class="field"><label>Department</label><input type="text" id="f-dept"></div>
      <div class="field"><label>University</label><input type="text" id="f-uni"></div>
      <div class="field"><label>Research Area</label><input type="text" id="f-area" placeholder="e.g. Machine Learning"></div>
      <div class="field"><label>Fellowship</label><input type="text" id="f-fellow" placeholder="e.g. CSIR-JRF"></div>
      <div class="field"><label>Enrollment Year</label><input type="number" id="f-year" placeholder="2024"></div>
      <div class="field"><label>Thesis Stage</label>
        <select id="f-stage"><option>Coursework</option><option>Proposal</option><option>Synopsis</option><option>Seminar</option><option>Submission</option></select>
      </div>
    </div>
  </div>
</main>

<script src="/js/api.js?v=4"></script>
<script>
  const session=requireAuth('scholar');
  if(!session) throw new Error();
  document.getElementById('sb-name').textContent=session.name||'Scholar';
  document.getElementById('sb-avatar').textContent=(session.name||'S').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('sb-dept').textContent=session.department||'';
  function doLogout(){logout();}

  async function load(){
    try{
      const s=await Scholar.get(session.scholar_id);
      const name=`${s.first_name||''} ${s.last_name||''}`.trim();
      document.getElementById('p-name').textContent=name||'Scholar';
      document.getElementById('p-uni').textContent=s.university||'University';
      document.getElementById('p-dept').textContent=s.department||'Department';
      document.getElementById('p-avatar').textContent=(name||'S').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'S';
      document.getElementById('f-first').value=s.first_name||'';
      document.getElementById('f-last').value=s.last_name||'';
      document.getElementById('f-phone').value=s.phone||'';
      document.getElementById('f-gender').value=s.gender||'';
      document.getElementById('f-dept').value=s.department||'';
      document.getElementById('f-uni').value=s.university||'';
      document.getElementById('f-area').value=s.research_area||'';
      document.getElementById('f-fellow').value=s.fellowship||'';
      document.getElementById('f-year').value=s.enroll_year||'';
      document.getElementById('f-stage').value=s.thesis_stage||'Coursework';
    }catch(e){console.error(e);}
  }

  async function saveProfile(){
    try{
      await Scholar.update(session.scholar_id,{
        first_name:document.getElementById('f-first').value,
        last_name:document.getElementById('f-last').value,
        phone:document.getElementById('f-phone').value,
        gender:document.getElementById('f-gender').value,
        department:document.getElementById('f-dept').value,
        university:document.getElementById('f-uni').value,
        research_area:document.getElementById('f-area').value,
        fellowship:document.getElementById('f-fellow').value,
        enroll_year:parseInt(document.getElementById('f-year').value)||null,
        thesis_stage:document.getElementById('f-stage').value
      });
      showToast('Profile updated successfully!');
      load();
    }catch(e){showToast('Failed to update profile','error');}
  }

  load();
</script>
</body>
</html>
