<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchHub — Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css?v=4">
<style>
.msg-layout{display:grid;grid-template-columns:260px 1fr;gap:0;height:calc(100vh - 120px);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card)}
.contacts{border-right:1px solid var(--border);overflow-y:auto}
.contact-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--light)}
.contact-item:hover,.contact-item.active{background:var(--blue-light)}
.contact-item.active .c-name{color:var(--blue)}
.c-avatar{width:36px;height:36px;border-radius:50%;background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.c-name{font-size:13px;font-weight:600}
.c-role{font-size:11px;color:var(--muted)}
.chat-area{display:flex;flex-direction:column}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-body{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.msg-bubble{max-width:65%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5}
.msg-bubble.sent{background:var(--blue);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg-bubble.recv{background:var(--light);color:var(--text);border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.6;margin-top:4px;text-align:right}
.chat-footer{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px}
.chat-footer input{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-family:'Inter',sans-serif;outline:none;background:var(--light)}
.chat-footer input:focus{border-color:var(--blue);background:#fff}
.send-btn{padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:20px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;font-weight:500;transition:.15s}
.send-btn:hover{background:var(--blue-dark)}
.no-chat{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>

  <nav class="nav">
    <a class="nav-item" href="dashboard.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>Dashboard</a>
    <a class="nav-item" href="my-professor.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M1 13c0-3 2.2-5 5-5s5 2 5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M12 7v4M14 9h-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>My Professor</a>
    <a class="nav-item" href="directory.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><circle cx="3" cy="12" r="2" stroke="currentColor" stroke-width="1.3" opacity=".5"/><circle cx="13" cy="12" r="2" stroke="currentColor" stroke-width="1.3" opacity=".5"/></svg>Faculty Directory</a>
    <a class="nav-item" href="milestones.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3.5l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Milestones</a>
    <a class="nav-item" href="publications.html"><svg width="16" height="16" fill="none" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M5 7h6M5 10h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>Publications</a>

  </div>
</aside>

<main class="main" style="padding-bottom:0">
  <div class="topbar"><div><div class="page-title">Messages</div><div class="page-sub">Chat with your professor and peers</div></div></div>
  <div class="msg-layout">
    <div class="contacts" id="contacts-list"></div>
    <div class="chat-area" id="chat-area">
      <div class="no-chat">Select a contact to start chatting</div>
    </div>
  </div>
</main>

<script src="/js/api.js?v=4"></script>
<script>
  const session=requireAuth('scholar');
  if(!session) throw new Error();
  document.getElementById('sb-name').textContent=session.name||'Scholar';
  document.getElementById('sb-avatar').textContent=(session.name||'S').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('sb-dept').textContent=session.department||'';
  function doLogout(){logout();}

  let contacts=[];
  let activeContact=null;

  async function loadContacts(){
    try{
      const sups=await Supervisor.all();
      contacts=sups;
      const cl=document.getElementById('contacts-list');
      cl.innerHTML=sups.map((s,i)=>`
        <div class="contact-item" id="c-${i}" onclick="openChat(${i})">
          <div class="c-avatar">${(s.name||'P').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}</div>
          <div><div class="c-name">${s.name}</div><div class="c-role">Professor · ${s.dept||''}</div></div>
        </div>
      `).join('');
    }catch(e){console.error(e);}
  }

  async function openChat(idx){
    document.querySelectorAll('.contact-item').forEach(el=>el.classList.remove('active'));
    document.getElementById(`c-${idx}`).classList.add('active');
    activeContact=contacts[idx];
    const initials=(activeContact.name||'P').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('chat-area').innerHTML=`
      <div class="chat-header">
        <div class="c-avatar">${initials}</div>
        <div><div class="c-name">${activeContact.name}</div><div class="c-role">${activeContact.dept||''}</div></div>
      </div>
      <div class="chat-body" id="chat-body"><div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Start the conversation!</div></div>
      <div class="chat-footer">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="send-btn" onclick="sendMsg()">Send</button>
      </div>
    `;
  }

  async function sendMsg(){
    const input=document.getElementById('msg-input');
    const text=input.value.trim();
    if(!text||!activeContact)return;
    const body=document.getElementById('chat-body');
    const bubble=document.createElement('div');
    bubble.className='msg-bubble sent';
    bubble.innerHTML=`${text}<div class="msg-time">Just now</div>`;
    body.appendChild(bubble);
    body.scrollTop=body.scrollHeight;
    input.value='';
    try{
      await Messages.send({sender_id:session.user_id,receiver_id:activeContact.user_id||activeContact.id,content:text});
    }catch(e){console.error(e);}
  }

  loadContacts();
</script>
</body>
</html>
