<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ResearchHub — Faculty Directory</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .directory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .faculty-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .faculty-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border-color: rgba(255,255,255,0.15);
    }
    .f-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .f-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.2rem;
    }
    .f-desig {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .f-dept {
      font-size: 0.75rem;
      background: rgba(255,255,255,0.05);
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      color: #e2e8f0;
      margin-bottom: 1.2rem;
    }
    .f-actions {
      display: flex;
      gap: 0.5rem;
      width: 100%;
    }
    .btn-msg {
      flex: 1;
      padding: 0.6rem;
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-msg:hover {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .search-bar {
      width: 100%;
      max-width: 400px;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.5rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      outline: none;
    }
    .search-bar input:focus {
      border-color: var(--primary);
    }
    .search-bar i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="app-container">
  <div id="sidebar-container"></div>

  <main class="main-wrapper">
    <div class="content-body animate-in">
      <div class="page-header" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
      <div>
        <h1>Faculty Directory</h1>
        <p class="page-sub">Find and connect with supervisors across departments</p>
      </div>
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by name or department...">
      </div>
    </div>

    <div class="directory-grid" id="facultyGrid">
      <div style="color:var(--text-muted)">Loading faculty directory...</div>
    </div>
    </div>
  </main>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
  let allFaculty = [];
  let myProfile = null;
  let pendingRequests = []; // faculty_ids I've already sent requests to
  const user = requireAuth('scholar');

  if (user) { init(); }

  async function init() {
    renderSidebar('directory.html');
    try {
      // Load faculty list, my profile (has supervisor_id), and my sent requests all at once
      [allFaculty, myProfile] = await Promise.all([
        apiGet('/supervisor/all'),
        apiGet(`/scholar/${user.scholar_id || user.id}`)
      ]);

      // Also load pending requests I have sent
      try {
        const sReqs = await apiGet(`/scholar/${user.scholar_id || user.id}/supervisor-request`);
        pendingRequests = sReqs.map(r => r.supervisor_id);
      } catch(_) {}

      renderGrid(allFaculty);
    } catch(e) {
      document.getElementById('facultyGrid').innerHTML = '<div style="color:#ef4444">Failed to load directory.</div>';
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = allFaculty.filter(f => 
        (f.name && f.name.toLowerCase().includes(q)) || 
        (f.department && f.department.toLowerCase().includes(q))
      );
      renderGrid(filtered);
    });
  }

  function getRequestBtn(f) {
    // Already accepted as supervisor
    if (myProfile && myProfile.supervisor_id && myProfile.supervisor_id === f.user_id) {
      return `<button class="btn-msg" style="flex:1; background:rgba(34,197,94,0.25);color:#22c55e;border-color:rgba(34,197,94,0.5); cursor:default;" disabled>
        <i class="fas fa-check-circle"></i> Your Supervisor
      </button>`;
    }
    // Already sent a pending request
    if (pendingRequests.includes(f.user_id)) {
      return `<button class="btn-msg" style="flex:1; background:rgba(245,158,11,0.15);color:#f59e0b;border-color:rgba(245,158,11,0.3); cursor:default;" disabled>
        <i class="fas fa-clock"></i> Requested
      </button>`;
    }
    // Default: send request
    return `<button class="btn-msg" style="flex:1; background:rgba(34,197,94,0.15);color:#22c55e;border-color:rgba(34,197,94,0.3);" onclick="requestSupervisor(${f.user_id}, this)">
      <i class="fas fa-user-plus"></i> Request
    </button>`;
  }

  function renderGrid(list) {
    const grid = document.getElementById('facultyGrid');
    if (!list.length) {
      grid.innerHTML = '<div style="color:var(--text-muted); grid-column: 1/-1;">No faculty members found.</div>';
      return;
    }

    grid.innerHTML = list.map(f => {
      const initials = f.name ? f.name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase() : 'F';
      return `
        <div class="faculty-card">
          <div class="f-avatar">${initials}</div>
          <div class="f-name">${f.name || 'Unknown Faculty'}</div>
          <div class="f-desig">${f.designation || 'Faculty Member'}</div>
          <div class="f-dept">${f.department || 'General'}</div>
          <div class="f-actions" style="flex-wrap:wrap; gap:0.5rem; justify-content:center;">
            <button class="btn-msg" style="width:100%; margin-bottom:0.2rem; background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.15);" onclick="window.location.href='view-profile.html?id=${f.user_id}'">
              <i class="fas fa-user-circle"></i> View Profile
            </button>
            <div style="display:flex; gap:0.5rem; width:100%;">
                <button class="btn-msg" onclick="window.location.href='messages.html?contact_id=${f.user_id}'">
                  <i class="fas fa-comment-dots"></i> Message
                </button>
                ${getRequestBtn(f)}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  async function requestSupervisor(facultyId, btn) {
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ...';
    btn.disabled = true;

    try {
      await apiPost('/scholar/request-supervisor', {
        scholar_id: user.scholar_id || user.id,
        supervisor_id: facultyId
      });
      btn.innerHTML = '<i class="fas fa-clock"></i> Requested';
      btn.style.background = 'rgba(245,158,11,0.15)';
      btn.style.color = '#f59e0b';
      btn.style.borderColor = 'rgba(245,158,11,0.3)';
      pendingRequests.push(facultyId);
      toast('Supervisor request sent successfully!');
    } catch (e) {
      btn.innerHTML = originalText;
      btn.disabled = false;
      toast(e.error || 'Failed to send request', 'error');
    }
  }
</script>
</body>
</html>
