<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — ResearchHub Faculty</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .tab-bar { display:flex; gap:0.25rem; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:5px; margin-bottom:2rem; }
        .tab-btn { flex:1; padding:0.7rem 1rem; border:none; border-radius:9px; font-family:'Outfit',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; background:transparent; color:rgba(255,255,255,0.45); transition:all 0.2s; }
        .tab-btn.active { background:#fff; color:#060a14; font-weight:700; box-shadow:0 4px 15px rgba(0,0,0,0.25); }
        .tab-panel { display:none; } .tab-panel.active { display:block; }

        .field-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
        .field-full  { grid-column:1/-1; }

        .fld { display:flex; flex-direction:column; gap:0.4rem; }
        .fld label { font-size:0.82rem; font-weight:600; color:rgba(255,255,255,0.55); text-transform:uppercase; letter-spacing:0.4px; }
        .fld input, .fld select, .fld textarea {
            background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
            border-radius:10px; color:#fff; font-size:0.95rem; font-family:'Outfit',sans-serif;
            padding:0.85rem 1rem; outline:none; transition:border-color 0.2s, box-shadow 0.2s; width:100%;
        }
        .fld input:focus, .fld select:focus, .fld textarea:focus { border-color:rgba(0,212,255,0.5); box-shadow:0 0 0 3px rgba(0,212,255,0.07); }
        .fld input[disabled], .fld select[disabled] { opacity:0.45; cursor:not-allowed; }
        .fld .err-msg { font-size:0.78rem; color:#f87171; display:none; margin-top:0.15rem; }
        .fld.has-error input, .fld.has-error select, .fld.has-error textarea { border-color:#ef4444; }
        .fld.has-error .err-msg { display:block; }

        .avatar-huge { width:96px; height:96px; min-width:96px; border-radius:50%; background:linear-gradient(135deg,#6366f1,#7c3aed); display:flex; align-items:center; justify-content:center; font-size:2.25rem; font-weight:800; color:#fff; }
        .save-btn { background:linear-gradient(90deg,#6366f1,#7c3aed); border:none; border-radius:12px; color:#fff; font-family:'Outfit',sans-serif; font-weight:700; font-size:0.95rem; padding:0.9rem 2.5rem; cursor:pointer; transition:opacity 0.2s; }
        .save-btn:hover { opacity:0.88; }
        .save-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .pass-wrap { position:relative; }
        .pass-wrap input { padding-right:3rem; }
        .pass-eye { position:absolute; right:1rem; top:50%; transform:translateY(-50%); background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:0.95rem; }
        .pass-eye:hover { color:rgba(255,255,255,0.7); }
    </style>
</head>
<body>
<div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-wrapper">
        <div class="content-body animate-in">

            <div class="header-row" style="margin-bottom:2rem">
                <div>
                    <h1>My Profile</h1>
                    <p>Manage your faculty credentials and research specialization</p>
                </div>
            </div>

            <!-- Avatar Ribbon -->
            <div class="panel" style="display:flex;align-items:center;gap:2rem;margin-bottom:2rem;flex-wrap:wrap">
                <div class="avatar-huge" id="avatarBig">GK</div>
                <div>
                    <div style="font-size:1.6rem;font-weight:800" id="nameDisplay">Loading...</div>
                    <div style="color:var(--primary);font-size:0.88rem;font-weight:600;margin:0.25rem 0" id="roleDisplay">Professor</div>
                    <div style="color:var(--text-muted);font-size:0.85rem" id="emailDisplay">—</div>
                </div>
                <div style="margin-left:auto;text-align:right">
                    <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:0.25rem">Faculty ID</div>
                    <div style="font-size:1.1rem;font-weight:700;color:var(--primary)" id="facultyIdDisplay">—</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('personal',this)"><i class="fas fa-user-tie" style="margin-right:0.5rem"></i>Personal Details</button>
                <button class="tab-btn" onclick="switchTab('academic',this)"><i class="fas fa-graduation-cap" style="margin-right:0.5rem"></i>Academic Credentials</button>
                <button class="tab-btn" onclick="switchTab('password',this)"><i class="fas fa-lock" style="margin-right:0.5rem"></i>Security</button>
            </div>

            <!-- TAB 1: PERSONAL -->
            <div class="tab-panel active" id="tab-personal">
                <div class="panel">
                    <div class="field-grid">
                        <div class="fld">
                            <label>First Name *</label>
                            <input type="text" id="firstName" placeholder="First Name">
                        </div>
                        <div class="fld">
                            <label>Last Name *</label>
                            <input type="text" id="lastName" placeholder="Last Name">
                        </div>
                        <div class="fld">
                            <label>Phone Number</label>
                            <input type="tel" id="phone" placeholder="10-digit number" maxlength="10">
                        </div>
                        <div class="fld">
                            <label>Gender</label>
                            <select id="gender">
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="fld field-full">
                            <label>Office / Lab Address</label>
                            <textarea id="officeRoom" rows="2" placeholder="e.g. Room 402, Block B, Dept of CSE"></textarea>
                        </div>
                    </div>
                    <div style="margin-top:1.75rem;display:flex;justify-content:flex-end">
                        <button class="save-btn" onclick="savePersonal()" id="saveBtnP">Save Personal Info</button>
                    </div>
                </div>
            </div>

            <!-- TAB 2: ACADEMIC -->
            <div class="tab-panel" id="tab-academic">
                <div class="panel">
                    <div class="field-grid">
                        <div class="fld">
                            <label>Designation</label>
                            <input type="text" id="designation" placeholder="e.g. Assistant Professor">
                        </div>
                        <div class="fld">
                            <label>Department</label>
                            <input type="text" id="department" placeholder="e.g. Mechanical Engineering">
                        </div>
                        <div class="fld">
                            <label>University</label>
                            <input type="text" id="university" placeholder="e.g. Technical University">
                        </div>
                        <div class="fld">
                            <label>PhD Guidance Status</label>
                            <select id="guidanceStatus">
                                <option value="Active">Currently Guiding</option>
                                <option value="Available">Available for Scholars</option>
                                <option value="Not Available">Not Available</option>
                            </select>
                        </div>
                        <div class="fld field-full">
                            <label>Specialization / Research Areas</label>
                            <textarea id="specialization" rows="3" placeholder="List your key research interests..."></textarea>
                        </div>
                    </div>
                    <div style="margin-top:1.75rem;display:flex;justify-content:flex-end">
                        <button class="save-btn" onclick="saveAcademic()" id="saveBtnA">Save Academic Details</button>
                    </div>
                </div>
            </div>

            <!-- TAB 3: PASSWORD -->
            <div class="tab-panel" id="tab-password">
                <div class="panel" style="max-width:500px">
                    <h3 style="margin-bottom:1.5rem">Update Security Credentials</h3>
                    <div class="fld" style="margin-bottom:1.2rem">
                        <label>Current Password</label>
                        <input type="password" id="oldPass">
                    </div>
                    <div class="fld" style="margin-bottom:1.2rem">
                        <label>New Password</label>
                        <input type="password" id="newPass">
                    </div>
                    <div class="fld" style="margin-bottom:1.5rem">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPass">
                    </div>
                    <button class="save-btn" onclick="updatePass()" id="saveBtnS">Change Password</button>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
    const user = requireAuth('faculty');
    const supId = user.supervisor_id || user.id;

    async function init() {
        renderSidebar('sup-profile.html');
        try {
            const s = await apiGet(`/supervisor/${supId}`);
            populate(s);
        } catch(e) { toast('Error loading profile', 'error'); }
    }

    function populate(s) {
        document.getElementById('nameDisplay').textContent = s.name;
        document.getElementById('roleDisplay').textContent = s.designation || 'Faculty Member';
        document.getElementById('avatarBig').textContent  = s.first_name[0] + s.last_name[0];
        document.getElementById('facultyIdDisplay').textContent = 'FAC-' + s.id.toString().padStart(4, '0');
        
        // Personal
        document.getElementById('firstName').value = s.first_name;
        document.getElementById('lastName').value  = s.last_name;
        document.getElementById('phone').value     = s.phone || '';
        document.getElementById('gender').value    = s.gender || 'Male';
        document.getElementById('officeRoom').value = s.office_room || '';

        // Academic
        document.getElementById('designation').value = s.designation || '';
        document.getElementById('department').value  = s.department || '';
        document.getElementById('university').value  = s.university || '';
        document.getElementById('specialization').value = s.specialization || '';
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        btn.classList.add('active');
    }

    async function savePersonal() {
        const btn = document.getElementById('saveBtnP');
        btn.disabled = true;
        try {
            await apiPut(`/supervisor/${supId}`, {
                first_name: document.getElementById('firstName').value,
                last_name:  document.getElementById('lastName').value,
                phone:      document.getElementById('phone').value,
                gender:     document.getElementById('gender').value,
                office_room:document.getElementById('officeRoom').value
            });
            toast('Personal details updated!');
            init();
        } catch(e) { toast('Failed to update', 'error'); }
        finally { btn.disabled = false; }
    }

    async function saveAcademic() {
        const btn = document.getElementById('saveBtnA');
        btn.disabled = true;
        try {
            await apiPut(`/supervisor/${supId}`, {
                designation:   document.getElementById('designation').value,
                department:    document.getElementById('department').value,
                university:    document.getElementById('university').value,
                specialization:document.getElementById('specialization').value
            });
            toast('Academic details updated!');
            init();
        } catch(e) { toast('Failed to update', 'error'); }
        finally { btn.disabled = false; }
    }

    async function updatePass() {
        const np = document.getElementById('newPass').value;
        const cp = document.getElementById('confirmPass').value;
        if (np !== cp) { toast('Passwords mismatch', 'error'); return; }
        
        const btn = document.getElementById('saveBtnS');
        btn.disabled = true;
        try {
            await apiPut('/auth/change-password', {
                user_id: user.id,
                old_password: document.getElementById('oldPass').value,
                new_password: np
            });
            toast('Password updated!');
            document.getElementById('oldPass').value = '';
            document.getElementById('newPass').value = '';
            document.getElementById('confirmPass').value = '';
        } catch(e) { toast(e.error || 'Update failed', 'error'); }
        finally { btn.disabled = false; }
    }

    init();
</script>
</body>
</html>
