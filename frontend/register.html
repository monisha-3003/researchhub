<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchHub — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter',sans-serif; min-height: 100vh; background: linear-gradient(135deg,#e8eef8,#dce6f5,#e4eaf6); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .container { width: 100%; max-width: 520px; }
  .logo-wrap { text-align: center; margin-bottom: 24px; }
  .logo-icon { width: 52px; height: 52px; background: linear-gradient(145deg,#5b6ef5,#4355e8); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .brand-name { font-size: 24px; font-weight: 700; color: #1a1d2e; }
  .brand-sub { font-size: 13px; color: #8a92a6; margin-top: 3px; }
  /* Steps */
  .steps { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; gap: 0; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .step-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #e5e9f2; background: white; font-size: 12px; font-weight: 600; color: #b0b8cc; display: flex; align-items: center; justify-content: center; transition: all .3s; }
  .step-dot.active { border-color: #4f5ef5; color: #4f5ef5; }
  .step-dot.done { background: #4f5ef5; border-color: #4f5ef5; color: white; }
  .step-label { font-size: 11px; color: #b0b8cc; font-weight: 500; transition: color .3s; }
  .step-label.active { color: #4f5ef5; }
  .step-label.done { color: #2e7d52; }
  .step-line { width: 60px; height: 2px; background: #e5e9f2; margin-bottom: 16px; transition: background .3s; }
  .step-line.done { background: #4f5ef5; }
  /* Card */
  .card { background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 24px rgba(80,100,160,.1); }
  .card-title { font-size: 18px; font-weight: 700; color: #1a1d2e; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: #8a92a6; margin-bottom: 24px; }
  .form-section { display: none; }
  .form-section.active { display: block; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e9f2; border-radius: 10px; font-size: 14px; font-family: 'Inter',sans-serif; color: #1a1d2e; background: #f8faff; outline: none; transition: border-color .2s, box-shadow .2s; }
  .field input:focus, .field select:focus { border-color: #4f5ef5; background: white; box-shadow: 0 0 0 3px rgba(79,94,245,.1); }
  .field input.invalid { border-color: #e24b4a !important; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .error-msg { background: #fff0f0; border: 1px solid #fcc; color: #c0392b; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; display: none; }
  .error-msg.show { display: block; }
  .nav-buttons { display: flex; gap: 10px; margin-top: 20px; }
  .btn { flex: 1; padding: 13px; border: none; border-radius: 12px; font-size: 14px; font-family: 'Inter',sans-serif; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-back { background: #f0f4fb; color: #8a92a6; }
  .btn-back:hover { background: #e5e9f2; }
  .btn-next { background: linear-gradient(135deg,#5b6ef5,#4355e8); color: white; }
  .btn-next:hover { opacity: .92; }
  .btn-next:disabled { opacity: .6; pointer-events: none; }
  .signin-link { text-align: center; font-size: 13px; color: #8a92a6; margin-top: 16px; }
  .signin-link a { color: #4f5ef5; text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
        <path d="M16 6L4 13l12 7 12-7-12-7z" fill="white"/>
        <path d="M4 19l12 7 12-7" stroke="white" stroke-width="2" stroke-linecap="round" opacity=".75"/>
      </svg>
    </div>
    <div class="brand-name">ResearchHub</div>
    <div class="brand-sub">Create your scholar account</div>
  </div>

  <div class="steps">
    <div class="step"><div class="step-dot active" id="dot-1">1</div><div class="step-label active" id="lbl-1">Personal</div></div>
    <div class="step-line" id="line-1"></div>
    <div class="step"><div class="step-dot" id="dot-2">2</div><div class="step-label" id="lbl-2">Academic</div></div>
    <div class="step-line" id="line-2"></div>
    <div class="step"><div class="step-dot" id="dot-3">3</div><div class="step-label" id="lbl-3">Account</div></div>
  </div>

  <div class="card">
    <div class="error-msg" id="error-msg"></div>

    <!-- Step 1: Personal -->
    <div class="form-section active" id="step-1">
      <div class="card-title">Personal Info</div>
      <div class="card-sub">Tell us a bit about yourself</div>
      <div class="field-row">
        <div class="field"><label>First name</label><input type="text" id="first_name" placeholder="Priya"></div>
        <div class="field"><label>Last name</label><input type="text" id="last_name" placeholder="Sharma"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Date of birth</label><input type="date" id="dob"></div>
        <div class="field"><label>Phone</label><input type="tel" id="phone" placeholder="9876543210" maxlength="10"></div>
      </div>
      <div class="field">
        <label>Gender</label>
        <select id="gender">
          <option value="">Select gender</option>
          <option>Male</option><option>Female</option><option>Other</option><option>Prefer not to say</option>
        </select>
      </div>
    </div>

    <!-- Step 2: Academic -->
    <div class="form-section" id="step-2">
      <div class="card-title">Academic Info</div>
      <div class="card-sub">Your research and enrollment details</div>
      <div class="field"><label>University / Institution</label><input type="text" id="university" placeholder="e.g. Anna University"></div>
      <div class="field-row">
        <div class="field">
          <label>Department</label>
          <select id="department">
            <option value="">Select dept.</option>
            <option>Computer Science</option><option>Electronics</option><option>Mechanical</option>
            <option>Civil</option><option>Physics</option><option>Chemistry</option>
            <option>Mathematics</option><option>Biotechnology</option><option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Enroll Year</label>
          <select id="enroll_year">
            <option value="">Year</option>
            <option>2026</option><option>2025</option><option>2024</option>
            <option>2023</option><option>2022</option><option>2021</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Research Area</label><input type="text" id="research_area" placeholder="e.g. Machine Learning, NLP"></div>
      <div class="field">
        <label>Fellowship</label>
        <select id="fellowship">
          <option value="">Select if applicable</option>
          <option>UGC-JRF</option><option>CSIR-JRF</option><option>DST-INSPIRE</option>
          <option>ICMR</option><option>Institutional fellowship</option><option>Self-funded</option><option>Other</option>
        </select>
      </div>
    </div>

    <!-- Step 3: Account -->
    <div class="form-section" id="step-3">
      <div class="card-title">Create Account</div>
      <div class="card-sub">Set up your login credentials</div>
      <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@university.edu"></div>
      <div class="field"><label>Password</label><input type="password" id="password" placeholder="Min. 8 chars, 1 number, 1 uppercase"></div>
      <div class="field"><label>Confirm Password</label><input type="password" id="confirm_password" placeholder="Repeat your password"></div>
    </div>

    <div class="nav-buttons">
      <button class="btn btn-back" id="btn-back" onclick="prevStep()" style="display:none">← Back</button>
      <button class="btn btn-next" id="btn-next" onclick="nextStep()">Continue →</button>
    </div>
  </div>
  <div class="signin-link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script>
  let currentStep = 1;

  function showStep(step) {
    document.querySelectorAll('.form-section').forEach((s, i) => {
      s.classList.toggle('active', i + 1 === step);
    });
    for (let i = 1; i <= 3; i++) {
      const dot = document.getElementById(`dot-${i}`);
      const lbl = document.getElementById(`lbl-${i}`);
      dot.className = 'step-dot' + (i < step ? ' done' : i === step ? ' active' : '');
      lbl.className = 'step-label' + (i < step ? ' done' : i === step ? ' active' : '');
      if (i < 3) {
        document.getElementById(`line-${i}`).className = 'step-line' + (i < step ? ' done' : '');
      }
    }
    document.getElementById('btn-back').style.display = step > 1 ? 'block' : 'none';
    document.getElementById('btn-next').textContent = step === 3 ? 'Create Account' : 'Continue →';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function validateStep1() {
    if (!document.getElementById('first_name').value.trim()) { showError('First name is required'); return false; }
    if (!document.getElementById('last_name').value.trim())  { showError('Last name is required'); return false; }
    if (!document.getElementById('phone').value.trim())      { showError('Phone number is required'); return false; }
    return true;
  }

  function validateStep2() {
    if (!document.getElementById('university').value.trim())   { showError('University is required'); return false; }
    if (!document.getElementById('department').value)          { showError('Department is required'); return false; }
    if (!document.getElementById('enroll_year').value)         { showError('Enrollment year is required'); return false; }
    if (!document.getElementById('research_area').value.trim()){ showError('Research area is required'); return false; }
    return true;
  }

  function validateStep3() {
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('password').value;
    const cpw   = document.getElementById('confirm_password').value;
    if (!email)             { showError('Email is required'); return false; }
    if (pw.length < 8)      { showError('Password must be at least 8 characters'); return false; }
    if (pw !== cpw)         { showError('Passwords do not match'); return false; }
    return true;
  }

  async function nextStep() {
    document.getElementById('error-msg').classList.remove('show');
    if (currentStep === 1 && !validateStep1()) return;
    if (currentStep === 2 && !validateStep2()) return;
    if (currentStep === 3) {
      if (!validateStep3()) return;
      await submitRegistration();
      return;
    }
    currentStep++;
    showStep(currentStep);
  }

  function prevStep() {
    if (currentStep > 1) { currentStep--; showStep(currentStep); }
  }

  async function submitRegistration() {
    const btn = document.getElementById('btn-next');
    btn.disabled    = true;
    btn.textContent = 'Creating account...';

    const payload = {
      role        : 'scholar',
      first_name  : document.getElementById('first_name').value.trim(),
      last_name   : document.getElementById('last_name').value.trim(),
      dob         : document.getElementById('dob').value || null,
      phone       : document.getElementById('phone').value.trim(),
      gender      : document.getElementById('gender').value,
      university  : document.getElementById('university').value.trim(),
      department  : document.getElementById('department').value,
      enroll_year : parseInt(document.getElementById('enroll_year').value),
      research_area: document.getElementById('research_area').value.trim(),
      fellowship  : document.getElementById('fellowship').value,
      email       : document.getElementById('email').value.trim().toLowerCase(),
      password    : document.getElementById('password').value,
    };

    try {
      const res  = await fetch('http://localhost:5000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');
      logout();
    } catch (err) {
      showError(err.message);
      btn.disabled    = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
