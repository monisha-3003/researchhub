<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages — ResearchHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-wrapper">
        <div class="content-body animate-in" style="padding-bottom:1rem">
            <div class="header-row" style="margin-bottom:1.5rem">
                <div>
                    <h1>Messages</h1>
                    <p>Real-time communication with your supervisor and faculty</p>
                </div>
            </div>

            <div class="messages-layout">
                <!-- LEFT: Conversations -->
                <div class="chat-sidebar">
                    <div class="chat-sidebar-header">
                        <span>Conversations</span>
                        <div style="display:flex;gap:0.5rem">
                            <button class="action-btn" onclick="openNewMessageModal()" title="Start new conversation"><i class="fas fa-plus"></i></button>
                            <button class="action-btn" onclick="loadConversations()" title="Refresh"><i class="fas fa-sync-alt"></i></button>
                        </div>
                    </div>
                    <div class="conv-list" id="convList">
                        <div class="empty-state">Loading...</div>
                    </div>
                </div>

                <!-- RIGHT: Chat -->
                <div class="chat-main" id="chatMain">
                    <div class="chat-header">
                        <div class="avatar-circle" id="chatAvatar" style="opacity:0.2">?</div>
                        <div>
                            <div style="font-weight:700" id="chatName">Select a conversation</div>
                            <div style="font-size:0.78rem;color:var(--text-muted)" id="chatRole">—</div>
                        </div>
                    </div>
                    <div class="chat-history" id="chatHistory">
                        <div class="empty-state"><i class="fas fa-comments" style="font-size:3rem;opacity:0.1;margin-bottom:1rem;display:block"></i>Choose a conversation to start messaging</div>
                    </div>
                    <div class="chat-footer">
                        <div class="chat-input-wrapper">
                            <input type="text" class="chat-input" id="msgInput" placeholder="Type a message..." disabled onkeydown="if(event.key==='Enter')sendMessage()">
                            <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal: New Message -->
<div id="newMessageModal" class="modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999">
    <div class="modal-content" style="width:90%;max-width:500px;background:white;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.15)">
        <div class="modal-header" style="padding:1.5rem;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center">
            <h2 style="margin:0;font-size:1.3rem">Start a Conversation</h2>
            <button class="close-btn" onclick="closeNewMessageModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer">&times;</button>
        </div>
        <div class="modal-body" style="padding:1.5rem">
            <input type="text" class="chat-input" id="recipientSearch" placeholder="Search by name..." onkeyup="filterRecipients()" style="width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:4px;font-family:inherit;box-sizing:border-box">
            <div id="recipientList" style="margin-top:1rem;max-height:400px;overflow-y:auto">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
const user = requireAuth(['scholar', 'supervisor', 'faculty']);
let currentReceiverId = null;
let msgInterval = null;
let availableRecipients = [];
let filteredRecipients = [];

async function openNewMessageModal() {
    const modal = document.getElementById('newMessageModal');
    modal.style.display = 'flex';
    document.getElementById('recipientSearch').value = '';
    
    const list = document.getElementById('recipientList');
    try {
        availableRecipients = await apiGet(`/messages/available-recipients/${user.id}`);
        filteredRecipients = availableRecipients;
        renderRecipientList();
    } catch(e) {
        console.error(e);
        list.innerHTML = `<div class="empty-state">Failed to load available recipients</div>`;
    }
}

function closeNewMessageModal() {
    document.getElementById('newMessageModal').style.display = 'none';
}

function filterRecipients() {
    const searchTerm = document.getElementById('recipientSearch').value.toLowerCase();
    filteredRecipients = availableRecipients.filter(r => 
        r.name.toLowerCase().includes(searchTerm) || 
        (r.department && r.department.toLowerCase().includes(searchTerm))
    );
    renderRecipientList();
}

function renderRecipientList() {
    const list = document.getElementById('recipientList');
    if (!filteredRecipients.length) {
        list.innerHTML = `<div class="empty-state">No recipients found</div>`;
        return;
    }
    
    list.innerHTML = filteredRecipients.map(r => {
        const initials = r.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
        return `
        <div style="display:flex;align-items:center;gap:1rem;padding:0.75rem;border-radius:4px;cursor:pointer;transition:background 0.2s" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='transparent'" onclick="startNewConversation(${r.user_id}, '${r.name.replace(/'/g, "\\'")}', '${r.role}', '${initials}')">
            <div class="avatar-circle" style="flex-shrink:0;font-size:0.8rem">${initials}</div>
            <div style="flex:1;min-width:0">
                <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.name}</div>
                <div style="font-size:0.85rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.role === 'scholar' ? r.enrollment_id || r.department : r.department}</div>
            </div>
        </div>`;
    }).join('');
}

async function startNewConversation(receiverId, name, role, initials) {
    closeNewMessageModal();
    await openChat(receiverId, name, role, initials);
}

async function init() {
    renderSidebar('messages.html');
    await loadConversations();

    // Auto-open chat if contact_id in URL
    const params = new URLSearchParams(window.location.search);
    const contactId = parseInt(params.get('contact_id'));
    if (contactId) {
        setTimeout(async () => {
            try {
                const recipients = await apiGet('/messages/available-recipients/' + user.id);
                const r = recipients.find(x => x.user_id == contactId);
                if (r) {
                    const initials = r.name.split(' ').map(function(n){ return n[0]; }).join('').substring(0,2).toUpperCase();
                    await openChat(r.user_id, r.name, r.role || 'scholar', initials);
                }
            } catch(e) { console.warn('Auto-open failed', e); }
        }, 400);
    }
}

async function loadConversations() {
    const list = document.getElementById('convList');
    try {
        const convs = await apiGet(`/messages/conversations-list/${user.id}`);
        if (!convs.length) {
            list.innerHTML = `<div class="empty-state">No conversations yet. Send a message to your supervisor first.</div>`;
            return;
        }
        list.innerHTML = convs.map(c => {
            const initials = c.name.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
            return `
            <div class="conv-item ${c.user_id === currentReceiverId ? 'active' : ''}" onclick="openChat(${c.user_id}, '${c.name}', '${c.role}', '${initials}')">
                <div class="avatar-circle" style="font-size:0.8rem">${initials}</div>
                <div class="conv-info">
                    <div class="conv-name">${c.name}</div>
                    <div class="conv-sub">${c.last_message || 'No messages yet'}</div>
                </div>
                ${c.unread > 0 ? `<span style="min-width:20px;height:20px;border-radius:50%;background:var(--primary);color:#000;font-size:0.7rem;font-weight:700;display:flex;align-items:center;justify-content:center">${c.unread}</span>` : ''}
            </div>`;
        }).join('');
    } catch(e) {
        list.innerHTML = `<div class="empty-state">Failed to load</div>`;
    }
}

async function openChat(receiverId, name, role, initials) {
    currentReceiverId = receiverId;
    document.getElementById('chatName').textContent = name;
    document.getElementById('chatRole').textContent = role.charAt(0).toUpperCase() + role.slice(1);
    document.getElementById('chatAvatar').textContent = initials;
    document.getElementById('chatAvatar').style.opacity = '1';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('msgInput').focus();

    // Mark active conversation
    document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));

    await loadMessages();

    // Auto-refresh every 5 seconds while chat is open
    if (msgInterval) clearInterval(msgInterval);
    msgInterval = setInterval(loadMessages, 5000);

    // Refresh conversation list too
    await loadConversations();
}

async function loadMessages() {
    if (!currentReceiverId) return;
    const history = document.getElementById('chatHistory');
    try {
        const msgs = await apiGet(`/messages/conversation?user1=${user.id}&user2=${currentReceiverId}`);
        if (!msgs.length) {
            history.innerHTML = `<div class="empty-state">No messages yet. Say hello! 👋</div>`;
            return;
        }
        history.innerHTML = msgs.map(m => {
            const isMine = m.sender_id === user.id;
            const time = new Date(m.sent_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return `
            <div class="msg-row ${isMine ? 'sent' : 'received'}">
                <div class="msg-bubble">
                    ${m.content}
                    <span class="msg-time">${time}</span>
                </div>
            </div>`;
        }).join('');
        // Auto-scroll to bottom
        history.scrollTop = history.scrollHeight;
    } catch(e) { console.error(e); }
}

async function sendMessage() {
    const input = document.getElementById('msgInput');
    const content = input.value.trim();
    if (!content || !currentReceiverId) return;
    input.value = '';

    try {
        await apiPost('/messages/', {
            sender_id  : user.id,
            receiver_id: currentReceiverId,
            content    : content,
        });
        await loadMessages();
    } catch(e) {
        toast('Failed to send message', 'error');
        input.value = content;
    }
}

init();
</script>
</body>
</html>
