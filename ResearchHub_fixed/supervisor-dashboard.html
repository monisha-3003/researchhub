<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard — ResearchHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-sub-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 0.3rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .page-sub-row .dot-sep { opacity: 0.4; }
        .page-sub-row span strong { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-wrapper">
        <div class="content-body animate-in">

            <div class="header-row">
                <div>
                    <h1 id="greeting">Good morning 👋</h1>
                    <div class="page-sub-row">
                        <span id="dateDisplay"></span>
                        <span class="dot-sep">·</span>
                        <span>Portal: <strong>Faculty</strong></span>
                    </div>
                </div>

            </div>

            <!-- Stats -->
            <div class="stats-grid" style="margin-bottom:2rem">
                <div class="card-stat">
                    <div class="cs-icon blue"><i class="fas fa-user-graduate"></i></div>
                    <div class="cs-val" id="stScholars">—</div>
                    <div class="cs-label">My Scholars</div>
                </div>
                <div class="card-stat">
                    <div class="cs-icon orange"><i class="fas fa-calendar-check"></i></div>
                    <div class="cs-val" id="stLeaves">—</div>
                    <div class="cs-label">Pending Leaves</div>
                    <div class="cs-tag" style="color:#f59e0b" id="leaveTag"></div>
                </div>
                <div class="card-stat">
                    <div class="cs-icon purple"><i class="fas fa-book-open"></i></div>
                    <div class="cs-val" id="stPubs">—</div>
                    <div class="cs-label">Pubs Under Review</div>
                </div>
                <div class="card-stat">
                    <div class="cs-icon green"><i class="fas fa-user-plus"></i></div>
                    <div class="cs-val" id="stSvReqs">—</div>
                    <div class="cs-label">Supervisor Requests</div>
                </div>
            </div>

            <div class="dash-grid">
                <!-- My Scholars -->
                <div class="panel">
                    <div class="panel-head">
                        <h3>My Scholars</h3>
                        <a href="sup-scholars.html" class="panel-link">View all →</a>
                    </div>
                    <div id="scholarList"><div class="empty-state">Loading...</div></div>
                </div>

                <!-- Pending Actions -->
                <div class="panel">
                    <div class="panel-head">
                        <h3>Pending Actions</h3>
                        <a href="sup-leave.html" class="panel-link">Leave approvals →</a>
                    </div>
                    <div id="pendingList"><div class="empty-state">Loading...</div></div>
                </div>
            </div>

        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
const user = requireAuth(['supervisor', 'faculty']);

async function init() {
    renderSidebar('supervisor-dashboard.html');

    const h = new Date().getHours();
    const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = `${greet}, ${user.name || 'Faculty'} 👋`;

    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('dateDisplay').textContent =
        `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

    const svId = user.supervisor_id || user.id;
    if (!svId) {
        document.getElementById('scholarList').innerHTML = `<div class="empty-state">No supervisor profile found. Please contact admin.</div>`;
        return;
    }

    try {
        const [scholars, leaves, pubs, svReqs] = await Promise.all([
            apiGet(`/supervisor/${svId}/scholars`),
            apiGet(`/supervisor/${svId}/leave-requests`),
            apiGet(`/supervisor/${svId}/publications`),
            apiGet(`/supervisor/${svId}/supervisor-requests`),
        ]);

        document.getElementById('stScholars').textContent = scholars.length;
        document.getElementById('stLeaves').textContent   = leaves.length;
        document.getElementById('stPubs').textContent     = pubs.length;
        document.getElementById('stSvReqs').textContent   = svReqs.length;

        if (leaves.length > 0) document.getElementById('leaveTag').textContent = 'Action required';

        const sl = document.getElementById('scholarList');
        sl.innerHTML = !scholars.length
            ? `<div class="empty-state"><i class="fas fa-users" style="font-size:2rem;opacity:0.15;margin-bottom:0.75rem;display:block"></i>No scholars assigned yet</div>`
            : scholars.map(s => {
                const pct = s.progress_pct || 0;
                const progColor = pct >= 70 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444';
                const uid = s.user_id || s.id;
                return `
                <div class="activity-item" onclick="window.location.href='view-profile.html?id=${uid}'" style="cursor:pointer">
                    <div class="act-icon"><i class="fas fa-user-graduate"></i></div>
                    <div class="act-text" style="flex:1">
                        <p>${s.name}</p>
                        <span>${s.department} · ${s.thesis_stage || 'Coursework'} · <span style="color:${progColor};font-weight:600">${pct}%</span></span>
                    </div>
                    <a href="messages.html?contact_id=${uid}" onclick="event.stopPropagation()" style="font-size:0.78rem;color:var(--primary);text-decoration:none;padding:0.35rem 0.75rem;border:1px solid var(--primary);border-radius:6px">Message</a>
                </div>`
            }).join('');

        const pl = document.getElementById('pendingList');
        const allPending = [
            ...leaves.map(l => ({ emoji:'📋', text:`${l.scholar_name} — ${l.leave_type} leave (${l.from_date})`, href:'sup-leave.html' })),
            ...pubs.map(p =>   ({ emoji:'📄', text:`Review: "${p.title.substring(0,50)}..."`, href:'sup-publications.html' })),
            ...svReqs.map(r => ({ emoji:'🎓', text:`${r.scholar_name} sent a supervisor request`, href:'sup-scholars.html' })),
        ];
        pl.innerHTML = !allPending.length
            ? `<div class="empty-state"><i class="fas fa-check-double" style="font-size:2rem;opacity:0.15;margin-bottom:0.75rem;display:block"></i>All caught up! No pending actions.</div>`
            : allPending.map(item => `
            <div class="activity-item" onclick="window.location.href='${item.href}'" style="cursor:pointer">
                <div class="act-icon">${item.emoji}</div>
                <div class="act-text">
                    <p>${item.text}</p>
                    <span>Click to review →</span>
                </div>
            </div>`).join('');

    } catch(e) { console.error('Dashboard load error:', e); toast('Failed to load dashboard data', 'error'); }
}

init();
</script>
</body>
</html>
