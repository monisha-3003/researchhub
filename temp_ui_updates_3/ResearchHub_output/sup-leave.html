<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Approvals — ResearchHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div id="sidebar-container"></div>
    <main class="main-wrapper">
        <div class="content-body animate-in">
            <div class="header-row">
                <div>
                    <h1>Leave Approvals</h1>
                    <p>Review and respond to your scholars' leave applications</p>
                </div>
                <div style="display:flex;gap:0.75rem">
                    <button id="filterPending" class="action-btn" onclick="setFilter('pending')" style="padding:0.5rem 1rem;width:auto" title="Pending">Pending</button>
                    <button id="filterAll" class="action-btn" onclick="setFilter('all')" style="padding:0.5rem 1rem;width:auto" title="All">All</button>
                </div>
            </div>
            <div id="leaveTable">
                <div class="empty-state">Loading...</div>
            </div>
        </div>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
const user = requireAuth(['supervisor','faculty']);
let currentFilter = 'pending';
let supervisorId = null;

async function init() {
    renderSidebar('sup-leave.html');
    supervisorId = user.supervisor_id;
    if (!supervisorId) { document.getElementById('leaveTable').innerHTML = `<div class="empty-state">No supervisor profile found</div>`; return; }
    await loadLeaves();
}

async function setFilter(f) {
    currentFilter = f;
    document.getElementById('filterPending').style.borderColor = (f === 'pending') ? 'var(--primary)' : 'var(--border)';
    document.getElementById('filterAll').style.borderColor = (f === 'all') ? 'var(--primary)' : 'var(--border)';
    await loadLeaves();
}

async function loadLeaves() {
    const container = document.getElementById('leaveTable');
    container.innerHTML = `<div class="empty-state">Loading...</div>`;
    try {
        const statusParam = currentFilter === 'all' ? '' : '?status=pending';
        const leaves = await apiGet(`/supervisor/${supervisorId}/leave-requests${statusParam}`);
        if (!leaves.length) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-check-double" style="font-size:2.5rem;opacity:0.2;margin-bottom:1rem;display:block"></i>No ${currentFilter === 'all' ? '' : 'pending '}leave requests</div>`;
            return;
        }
        container.innerHTML = `<div class="panel"><table style="width:100%;border-collapse:collapse">
            <thead><tr style="border-bottom:1px solid var(--border)">
                <th style="${thStyle}">Scholar</th>
                <th style="${thStyle}">Leave Type</th>
                <th style="${thStyle}">Date Range</th>
                <th style="${thStyle}">Reason</th>
                <th style="${thStyle}">Status</th>
                <th style="${thStyle}">Actions</th>
            </tr></thead>
            <tbody>
                ${leaves.map(l => `
                <tr style="border-bottom:1px solid rgba(255,255,255,0.03)">
                    <td style="padding:1rem 0.75rem;font-weight:600">${l.scholar_name}</td>
                    <td style="padding:1rem 0.75rem;color:var(--text-muted);font-size:0.85rem">${l.leave_type || 'Personal'}</td>
                    <td style="padding:1rem 0.75rem;font-size:0.85rem">
                        <div>${formatDate(l.from_date)}</div>
                        <div style="color:var(--text-muted);font-size:0.78rem">to ${formatDate(l.to_date)}</div>
                    </td>
                    <td style="padding:1rem 0.75rem;font-size:0.82rem;color:var(--text-muted);max-width:200px">${(l.reason||'').substring(0,80)}${l.reason&&l.reason.length>80?'...':''}</td>
                    <td style="padding:1rem 0.75rem"><span class="badge ${badgeClass(l.status)}">${l.status}</span></td>
                    <td style="padding:1rem 0.75rem">
                        ${l.status === 'pending' ? `
                        <div style="display:flex;gap:0.5rem">
                            <button onclick="reviewLeave(${l.id},'approved')" style="padding:0.5rem 1rem;border-radius:8px;border:1px solid #22c55e;background:rgba(34,197,94,0.08);color:#22c55e;cursor:pointer;font-size:0.8rem;font-weight:600">
                                ✓ Approve
                            </button>
                            <button onclick="reviewLeave(${l.id},'rejected')" style="padding:0.5rem 1rem;border-radius:8px;border:1px solid #ef4444;background:rgba(239,68,68,0.08);color:#ef4444;cursor:pointer;font-size:0.8rem;font-weight:600">
                                ✕ Reject
                            </button>
                        </div>` : `<span style="font-size:0.82rem;color:var(--text-muted)">Reviewed</span>`}
                    </td>
                </tr>`).join('')}
            </tbody>
        </table></div>`;
    } catch(e) {
        container.innerHTML = `<div class="empty-state">Failed to load requests</div>`;
    }
}

async function reviewLeave(id, action) {
    try {
        await apiPut(`/supervisor/leave/${id}/review`, { status: action });
        toast(`Leave request ${action}!`);
        await loadLeaves();
    } catch(e) { toast('Action failed', 'error'); }
}

function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
}

const thStyle = "padding:0.75rem;text-align:left;font-size:0.78rem;color:var(--text-muted);font-weight:600;text-transform:uppercase";

init();
</script>
</body>
</html>
